on:
  workflow_call:
    inputs:
      registry:
        description: 'Docker registry'
        default: 'ghcr.io'
        type: string
      image-name:
        description: 'Docker image name'
        default: '${{ github.repository }}'
        type: string
      username:
        description: 'Username for Docker registry'
        default: '${{ github.actor }}'
        type: string
      platforms:
        description: 'Platforms to build for'
        default: 'linux/amd64,linux/arm64'
        type: string
    secrets:
      password:
        description: 'Password for Docker registry'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          trusted-registries: docker.io,ghcr.io,registry.gitlab.com
      - uses: azohra/shell-linter@30a9cf3f6cf25c08fc98f10d7dc4167f7b5c0c00 # v0.8.0
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Check out Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build and push Docker image
        uses: reitermarkus/.github/actions/docker-build-push@dfe74d954c032bff213a38bbd6e61cc2e3ae4ec5 # main
        with:
          registry: ${{ inputs.registry }}
          image-name: ${{ inputs.image-name }}
          username: ${{ inputs.username }}
          password: ${{ secrets.password || github.token }}
          platforms: ${{ inputs.platforms }}
        id: build-push
