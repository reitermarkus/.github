on: [pull_request, push]

name: CI

jobs:
  ci:
    uses: reitermarkus/.github/.github/workflows/docker-build-push.yml@b07d75e134de3b8deca2cead5535fb9a8977137b # main
    with:
      image-name: ${{ github.repository_owner }}/github
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@03026bd55840025343414baec5d9337c5f9c7ea7 # v44.0.4
        with:
          configurationFile: renovate-config.js
          token: ${{ secrets.GH_TOKEN }}
        env:
          LOG_LEVEL: 'debug'

      - name: Validate Renovate config
        uses: rinchsan/renovate-config-validator@8cf44ae5646f111f838a03ac7ebd4e1c1f9be983 # v0.2.1
        with:
          pattern: '*.json'
